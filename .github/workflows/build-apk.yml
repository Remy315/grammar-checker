name: Build APK

# 触发条件：推送到main分支自动构建
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装JDK 11（Android构建必须）
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 3. 配置Android SDK环境
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          channel: stable

      # 4. 给Gradle执行权限（Linux环境必须）
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 构建Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. 上传APK作为构建产物（已更新为v4最新版本）
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
